<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Tracker</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Job Tracker</h1>
        <p class="muted">CRUD + .NET 6 API + Vanilla JS</p>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="btn">Refresh</button>
      </div>
    </header>

    <section class="panel">
      <h2>Add application</h2>
      <form id="create-form" class="grid">
        <label>
          Company *
          <input name="company" type="text" required minlength="2" placeholder="e.g. Accedia" />
        </label>

        <label>
          Position *
          <input name="position" type="text" required minlength="2" placeholder="e.g. Junior Frontend Developer" />
        </label>

        <label>
          Status
          <select name="status">
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </label>

        <label>
          Applied on
          <input name="appliedOn" type="date" />
        </label>

        <label class="span-2">
          Link
          <input name="link" type="text" placeholder="https://example.com или example.com" />
        </label>

        <label class="span-2">
          Notes
          <textarea name="notes" rows="3" placeholder="Short notes..."></textarea>
        </label>

        <div class="span-2 row">
          <button class="btn primary" type="submit">Add</button>
          <span id="create-error" class="error"></span>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Applications</h2>
        <div class="filters">
          <input id="search" type="search" placeholder="Search company/position..." />
          <select id="status-filter">
            <option value="">All statuses</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>

      <div id="state" class="muted"></div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Company</th>
              <th>Position</th>
              <th>Status</th>
              <th>Applied</th>
              <th class="right">Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h3 id="modal-title">Edit application</h3>
        <button class="icon-btn" id="modal-close" title="Close">✕</button>
      </div>

      <form id="edit-form" class="grid">
        <input type="hidden" name="id" />

        <label>
          Company *
          <input name="company" type="text" required minlength="2" />
        </label>

        <label>
          Position *
          <input name="position" type="text" required minlength="2" />
        </label>

        <label>
          Status
          <select name="status">
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </label>

        <label>
          Applied on
          <input name="appliedOn" type="date" />
        </label>

        <label class="span-2">
          Link
          <input name="link" type="text" placeholder="https://example.com или example.com" />
        </label>

        <label class="span-2">
          Notes
          <textarea name="notes" rows="3"></textarea>
        </label>

        <div class="span-2 row">
          <button class="btn primary" type="submit">Save</button>
          <button class="btn" type="button" id="btn-cancel">Cancel</button>
          <span id="edit-error" class="error"></span>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
